name: CI

on:
  push:
    branches: [main]
  pull_request:

# Node 22: relay's better-sqlite3 (and the mobile jest tests) build native
# modules; the project pins Node 22 (relay engines ">=22 <23").

jobs:
  mobile:
    name: mobile (typecheck · lint · jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  relay:
    name: relay (typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: relay/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
