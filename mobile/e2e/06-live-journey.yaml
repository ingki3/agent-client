# Full live journey against a real Telegram bot (run: maestro test -e BOT_TOKEN=… e2e/06-live-journey.yaml):
#   AUTH (phone + OTP) → connect bot token (getMe) → add → LIVE RECEIVE (app long-polls
#   getUpdates and shows an incoming message) → LIVE SEND (app → your Telegram).
# Requires: you sent at least one message to the bot beforehand, and NO other getUpdates
# consumer is running on the same token (Telegram 409s concurrent pollers).
appId: dev.simplist.agentclient.mockup
tags:
  - live
---
- launchApp:
    clearState: true
- runFlow: subflows/login.yaml # AUTH: phone + OTP 000000
- tapOn:
    id: "fabAddBuddy"
- tapOn:
    id: "tokenInput"
- inputText: ${BOT_TOKEN} # connect real bot token
- waitForAnimationToEnd
- tapOn:
    id: "tokenNext" # getMe → validates token
- extendedWaitUntil:
    visible:
      id: "confirmAdd" # preview (S-13) with bot metadata
    timeout: 15000
- tapOn:
    id: "confirmAdd" # add → token to SecureStore → chat
- assertVisible:
    id: "chatInput"
# LIVE RECEIVE: app poller picks up a pending incoming message and renders it.
# optional — Telegram updates are consumed once, so a re-run may find none; the receive
# path is also proven at the protocol level (bot received your messages via getUpdates).
- extendedWaitUntil:
    visible:
      text: ".*이봐.*"
    timeout: 30000
    optional: true
# LIVE SEND: app → sendMessage → your Telegram chat.
- tapOn:
    id: "chatInput"
- inputText: "앱에서 보낸 라이브 테스트입니다 ✅"
- tapOn:
    id: "chatSend"
- assertVisible:
    text: ".*앱에서 보낸 라이브 테스트.*"
